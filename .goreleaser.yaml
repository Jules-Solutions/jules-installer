version: 2

project_name: jules-setup

before:
  hooks:
    - go mod tidy

builds:
  - id: jules-setup
    main: ./cmd/jules-setup
    binary: jules-setup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Jules-Solutions/jules-installer/pkg/version.Version={{.Version}}
      - -X github.com/Jules-Solutions/jules-installer/pkg/version.Commit={{.Commit}}
      - -X github.com/Jules-Solutions/jules-installer/pkg/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    builds:
      - jules-setup

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Jules-Solutions
    name: jules-installer
  draft: false
  prerelease: auto
